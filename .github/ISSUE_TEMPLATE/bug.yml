name: "Bug"
description: App behaviour deviates from expectation
title: "[BUG]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: component
    attributes:
      label: Impacted Component
      value: |
        Frontend UI, Backend Route tasks/ ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the app
        2. Navigate to '...'
        3. Trigger '...'
    validations:
      required: true
  - type: checkboxes
    id: platform
    attributes:
      label: Platform
      options:
        - label: iOS (Physical Device)
        - label: iOS (Simulator)
        - label: Android (Physical Device)
        - label: Android (Emulator)
        - label: Web (React Native Web)
        - label: Backend API
  - type: textarea
    id: logs
    attributes:
      label: Logs / Tracebacks
      description: Please paste any relevant logs here
      render: bash
