name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "apps/mobile/**"
  pull_request:
    branches: [main, master]
    paths:
      - "apps/mobile/**"

jobs:
  validate-ui:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "apps/mobile/pnpm-lock.yaml"

      - name: install dep
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile

      - name: run TypeScript type check
        run: |
          cd apps/mobile
          pnpm exec tsc --noEmit

      - name: run linter
        run: |
          cd apps/mobile
          pnpm run lint

      - name: run tests
        run: |
          cd apps/mobile
          pnpm test
